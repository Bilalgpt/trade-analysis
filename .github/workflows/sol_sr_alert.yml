name: SOL S/R Retest Scanner

on:
  workflow_dispatch:        # manual trigger only — schedule disabled

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run S/R Retest Scanner
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python sol_sr_alert.py

      - name: Commit and push report
        run: |
          git config user.name "SOL Alert Bot"
          git config user.email "bot@noreply.github.com"
          git add docs/sr_report.html
          git diff --staged --quiet || git commit -m "report: S/R scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
